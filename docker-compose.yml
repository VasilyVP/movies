services:
  neo4j:
    image: neo4j:5
    container_name: movies-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 6G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data:/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: movies-chromadb
    ports:
      - "8001:8000"   # ChromaDB HTTP API (FastAPI uses host 8000)
    volumes:
      - chromadb_data:/chroma/chroma

volumes:
  neo4j_data:
  neo4j_logs:
  chromadb_data:
